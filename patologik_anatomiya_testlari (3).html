<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patologik Anatomiya Testlari</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1628;--card:#1a2744;--card2:#1e2e4f;--accent:#38bdf8;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;--text:#f1f5f9;--muted:#94a3b8;--border:#2a3f6b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
.hidden{display:none!important}

/* ---- EKG CANVAS ---- */
#ekg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.55;}

/* ---- TOP NAV ---- */
.top-nav{position:fixed;top:0;right:0;z-index:100;padding:14px 20px;}
.tg-link{display:flex;align-items:center;gap:8px;text-decoration:none;background:rgba(26,39,68,0.85);border:1px solid var(--border);border-radius:99px;padding:7px 14px 7px 10px;backdrop-filter:blur(8px);transition:all .2s;}
.tg-link:hover{border-color:var(--accent);box-shadow:0 0 16px rgba(56,189,248,.2);}
.tg-dot{width:10px;height:10px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80,0 0 12px #4ade80;animation:pulse-dot 1.4s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 4px #4ade80,0 0 8px #4ade80;}50%{box-shadow:0 0 10px #4ade80,0 0 20px #4ade80,0 0 30px rgba(74,222,128,.4);}}
.tg-name{font-family:'Fira Mono',monospace;font-size:.8rem;font-weight:700;color:var(--accent);}

/* ---- HOME ---- */
#home{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:88px 16px 32px;position:relative;z-index:1;}
.logo{font-size:1.3rem;font-weight:900;color:var(--text);letter-spacing:1px;margin-bottom:4px;text-align:center;text-transform:uppercase;}
.logo span{color:var(--accent);}
.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:32px;}
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;width:100%;max-width:900px;margin-bottom:24px;}
.section-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .2s;text-align:left;position:relative;overflow:hidden;}
.section-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(56,189,248,.04),transparent);opacity:0;transition:opacity .2s;}
.section-btn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(56,189,248,.12);}
.section-btn:hover::before{opacity:1;}
.section-btn .num{font-size:.75rem;font-weight:700;color:var(--accent);font-family:'Fira Mono',monospace;letter-spacing:1px;}
.section-btn .title{font-size:1rem;font-weight:700;margin:4px 0;}
.section-btn .meta{font-size:.8rem;color:var(--muted);}
.section-btn .badge{position:absolute;top:12px;right:12px;background:var(--accent);color:#0a1628;font-size:.7rem;font-weight:800;border-radius:99px;padding:2px 8px;}
.random-btn{background:linear-gradient(135deg,var(--purple),var(--accent));color:#0a1628;font-weight:800;font-size:1rem;border:none;border-radius:14px;padding:16px 32px;cursor:pointer;width:100%;max-width:900px;letter-spacing:.5px;transition:all .2s;}
.random-btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 32px rgba(56,189,248,.3);}

/* ---- TIME MODAL ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:400px;text-align:center;}
.modal h2{font-size:1.4rem;font-weight:800;margin-bottom:8px;}
.modal p{color:var(--muted);font-size:.9rem;margin-bottom:24px;}
.time-options{display:flex;flex-direction:column;gap:10px;}
.time-btn{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px 20px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--text);transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px;}
.time-btn:hover{border-color:var(--accent);background:rgba(56,189,248,.1);}
.time-btn .ico{font-size:1.4rem;}
.time-btn .info{flex:1;}
.time-btn .label{font-size:1rem;font-weight:800;}
.time-btn .desc{font-size:.8rem;color:var(--muted);font-weight:400;}

/* ---- QUIZ ---- */
#quiz{min-height:100vh;display:flex;flex-direction:column;padding:0;position:relative;z-index:1;}
.quiz-header{background:rgba(10,22,40,0.92);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;backdrop-filter:blur(8px);}
.back-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 12px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.quiz-info{flex:1;text-align:center;}
.quiz-title{font-size:.9rem;font-weight:700;color:var(--muted);}
.timer-display{font-family:'Fira Mono',monospace;font-size:1.1rem;font-weight:700;padding:6px 14px;border-radius:8px;background:var(--card2);border:1px solid var(--border);}
.timer-display.warn{color:var(--yellow);border-color:var(--yellow);}
.timer-display.danger{color:var(--red);border-color:var(--red);animation:pulse .6s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-bar{height:3px;background:var(--border);position:relative;}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;}
.quiz-body{flex:1;padding:20px 16px;max-width:700px;margin:0 auto;width:100%;}
.q-counter{font-size:.8rem;font-weight:700;color:var(--muted);font-family:'Fira Mono',monospace;margin-bottom:12px;}
.q-text{font-size:1.05rem;font-weight:700;line-height:1.6;margin-bottom:24px;padding:20px;background:var(--card);border-radius:14px;border:1px solid var(--border);}
.options{display:flex;flex-direction:column;gap:10px;}
.option-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;color:var(--text);transition:all .2s;display:flex;align-items:center;gap:12px;}
.option-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(56,189,248,.08);}
.option-btn .opt-label{font-family:'Fira Mono',monospace;font-size:.8rem;font-weight:700;color:var(--accent);min-width:20px;}
.option-btn.correct{border-color:var(--green)!important;background:rgba(74,222,128,.12)!important;}
.option-btn.correct .opt-label{color:var(--green);}
.option-btn.wrong{border-color:var(--red)!important;background:rgba(248,113,113,.12)!important;}
.option-btn.wrong .opt-label{color:var(--red);}
.option-btn:disabled{cursor:default;opacity:.7;}
.feedback{margin-top:16px;padding:14px;border-radius:12px;font-size:.9rem;font-weight:700;}
.feedback.correct{background:rgba(74,222,128,.12);border:1px solid var(--green);color:var(--green);}
.feedback.wrong{background:rgba(248,113,113,.12);border:1px solid var(--red);color:var(--red);}

/* ---- RESULT ---- */
#result{min-height:100vh;padding:24px 16px;max-width:700px;margin:0 auto;position:relative;z-index:1;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;text-align:center;margin-bottom:20px;}
.score-circle{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:2rem;border:4px solid var(--accent);}
.score-circle.good{border-color:var(--green);color:var(--green);}
.score-circle.mid{border-color:var(--yellow);color:var(--yellow);}
.score-circle.bad{border-color:var(--red);color:var(--red);}
.score-circle .pct{font-size:1.8rem;}
.score-circle .lbl{font-size:.7rem;font-weight:700;color:var(--muted);}
.stats-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
.stat{background:var(--card2);border-radius:10px;padding:12px 20px;text-align:center;}
.stat .val{font-size:1.4rem;font-weight:800;}
.stat .lbl{font-size:.75rem;color:var(--muted);}
.action-btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.btn-primary{background:var(--accent);color:#0a1628;font-weight:800;font-size:.9rem;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.btn-primary:hover{opacity:.85;}
.btn-secondary{background:var(--card2);color:var(--text);font-weight:700;font-size:.9rem;border:1px solid var(--border);border-radius:10px;padding:12px 24px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.btn-secondary:hover{border-color:var(--accent);}
.btn-error{background:rgba(248,113,113,.15);color:var(--red);font-weight:700;font-size:.9rem;border:1px solid var(--red);border-radius:10px;padding:12px 24px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
.btn-error:hover{background:rgba(248,113,113,.25);}

/* ---- ANALYSIS ---- */
#analysis{min-height:100vh;padding:24px 16px;max-width:700px;margin:0 auto;position:relative;z-index:1;}
.analysis-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.analysis-header h1{font-size:1.5rem;font-weight:900;}
.analysis-item{background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.analysis-q{padding:16px;font-size:.95rem;font-weight:700;line-height:1.5;}
.analysis-q .q-num{font-family:'Fira Mono',monospace;font-size:.75rem;color:var(--muted);}
.analysis-answers{padding:0 16px 16px;display:flex;flex-direction:column;gap:6px;}
.a-row{padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:8px;}
.a-row.correct{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.4);color:var(--green);}
.a-row.user-wrong{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);color:var(--red);}
.a-row .tag{font-size:.7rem;font-weight:800;padding:2px 6px;border-radius:4px;white-space:nowrap;}
.a-row.correct .tag{background:var(--green);color:#0a1628;}
.a-row.user-wrong .tag{background:var(--red);color:#fff;}

/* ---- ERROR ROOM ---- */
#error-room{min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}
.er-header{background:rgba(248,113,113,.1);border-bottom:1px solid rgba(248,113,113,.3);padding:16px 20px;display:flex;align-items:center;gap:12px;}
.er-title{font-size:1rem;font-weight:800;color:var(--red);}
.er-badge{background:var(--red);color:#fff;font-size:.7rem;font-weight:800;border-radius:99px;padding:2px 8px;}

/* ---- REPEAT ERRORS BUTTON ---- */
.btn-repeat{background:rgba(248,113,113,.15);color:var(--red);font-weight:800;font-size:.9rem;border:2px solid var(--red);border-radius:10px;padding:12px 24px;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:8px;transition:all .2s;}
.btn-repeat:hover{background:rgba(248,113,113,.3);}

.streak-badge{background:var(--yellow);color:#0a1628;font-size:.7rem;font-weight:800;border-radius:99px;padding:2px 8px;margin-left:6px;}
</style>
</head>
<body>

<!-- EKG BACKGROUND CANVAS -->
<canvas id="ekg-canvas"></canvas>

<!-- TOP NAV - Telegram link -->
<nav class="top-nav">
  <a class="tg-link" href="https://t.me/DeFs_Team" target="_blank" rel="noopener">
    <span class="tg-dot"></span>
    <span class="tg-name">@DeFs_Team</span>
  </a>
</nav>

<!-- HOME -->
<div id="home">
  <div class="logo">Patologik <span>Anatomiya</span> Testlari</div>
  <div class="subtitle">542 ta savol | Tibbiyot talabalari uchun</div>
  <div class="section-grid" id="sectionGrid"></div>
  <button class="random-btn" onclick="startRandom()">🎲 Tasodifiy 20 ta savol (Imtihon rejimi — 15 daqiqa)</button>
</div>

<!-- TIME MODAL -->
<div class="modal-overlay hidden" id="timeModal">
  <div class="modal">
    <h2>⏱ Vaqt tanlang</h2>
    <p>Har bir savol uchun vaqt chegarasini tanlang</p>
    <div class="time-options">
      <button class="time-btn" onclick="confirmTime(15)">
        <span class="ico">⚡</span>
        <div class="info"><div class="label">15 soniya</div><div class="desc">Tez — qisqa javoblar uchun</div></div>
      </button>
      <button class="time-btn" onclick="confirmTime(30)">
        <span class="ico">⏳</span>
        <div class="info"><div class="label">30 soniya</div><div class="desc">O'rta — normal jadal</div></div>
      </button>
      <button class="time-btn" onclick="confirmTime(60)">
        <span class="ico">🕐</span>
        <div class="info"><div class="label">1 daqiqa</div><div class="desc">Sekin — murakkab savollar uchun</div></div>
      </button>
      <button class="time-btn" onclick="confirmTime(0)">
        <span class="ico">♾️</span>
        <div class="info"><div class="label">Cheksiz</div><div class="desc">Vaqt chegarasisiz</div></div>
      </button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Orqaga</button>
    <div class="quiz-info">
      <div class="quiz-title" id="quizTitle"></div>
    </div>
    <div class="timer-display" id="timerDisplay"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="quiz-body">
    <div class="q-counter" id="qCounter"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsEl"></div>
    <div id="feedbackEl" class="hidden"></div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
  <div class="result-card">
    <div class="score-circle" id="scoreCircle">
      <div class="pct" id="scorePct"></div>
      <div class="lbl">BALL</div>
    </div>
    <h2 id="resultTitle" style="font-size:1.3rem;margin-bottom:8px;"></h2>
    <div class="stats-row">
      <div class="stat"><div class="val" id="statCorrect" style="color:var(--green)"></div><div class="lbl">To'g'ri</div></div>
      <div class="stat"><div class="val" id="statWrong" style="color:var(--red)"></div><div class="lbl">Xato</div></div>
      <div class="stat"><div class="val" id="statTotal"></div><div class="lbl">Jami</div></div>
    </div>
    <div class="action-btns" id="resultBtns"></div>
  </div>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="hidden">
  <div class="analysis-header">
    <button class="back-btn" onclick="showResult()">← Natija</button>
    <h1>📊 Tahlil</h1>
  </div>
  <div id="analysisContent"></div>
</div>

<!-- ERROR ROOM -->
<div id="error-room" class="hidden">
  <div class="er-header">
    <button class="back-btn" onclick="goHome()">← Bosh sahifa</button>
    <div class="er-title">🔴 Xatolar ustida ishlash</div>
    <div class="er-badge" id="erBadge"></div>
  </div>
  <div style="flex:1;" id="errorRoomBody"></div>
</div>

<script>

</script>

<script>
// ===================== STATE =====================
let currentSection = null;
let currentQuestions = [];
let currentIdx = 0;
let answers = []; // {q, chosen, correct}
let timerSeconds = 0;
let timerInterval = null;
let isRandomMode = false;
let pendingSectionIdx = null;

// Persistent stats: sessionStorage per section
function getStats(sectionKey){
  try{ return JSON.parse(sessionStorage.getItem('stats_'+sectionKey)||'{}'); }catch(e){return {};}
}
function saveStats(sectionKey, qIdx, isCorrect){
  let s=getStats(sectionKey);
  if(!s[qIdx]) s[qIdx]={attempts:0,errors:0};
  s[qIdx].attempts++;
  if(!isCorrect) s[qIdx].errors++;
  sessionStorage.setItem('stats_'+sectionKey, JSON.stringify(s));
}
function getRepeatErrors(sectionKey){
  // Questions with errors in 3+ consecutive recent sessions
  try{
    let sessions=JSON.parse(sessionStorage.getItem('sessions_'+sectionKey)||'[]');
    if(sessions.length<3) return [];
    let last3=sessions.slice(-3);
    // Find qIdx that had errors in all 3 sessions
    let errorSets=last3.map(s=>new Set(s.errors));
    let allQIdx=[...errorSets[0]].filter(i=>errorSets[1].has(i)&&errorSets[2].has(i));
    return allQIdx.map(Number);
  }catch(e){return [];}
}
function recordSession(sectionKey, errorIdxList){
  let sessions=JSON.parse(sessionStorage.getItem('sessions_'+sectionKey)||'[]');
  sessions.push({errors:errorIdxList, time:Date.now()});
  if(sessions.length>10) sessions=sessions.slice(-10);
  sessionStorage.setItem('sessions_'+sectionKey, JSON.stringify(sessions));
}

// ===================== SECTIONS =====================
const SECTION_SIZE = 50;
function getSections(){
  let sections=[];
  for(let i=0;i<ALL_QUESTIONS.length;i+=SECTION_SIZE){
    let qs=ALL_QUESTIONS.slice(i,i+SECTION_SIZE);
    sections.push({start:i+1,end:Math.min(i+SECTION_SIZE,ALL_QUESTIONS.length),qs});
  }
  return sections;
}

function buildHome(){
  let sections=getSections();
  let grid=document.getElementById('sectionGrid');
  grid.innerHTML='';
  sections.forEach((sec,idx)=>{
    let key='sec_'+idx;
    let repeats=getRepeatErrors(key);
    let btn=document.createElement('button');
    btn.className='section-btn';
    btn.innerHTML=`
      <div class="num">BO'LIM ${idx+1}</div>
      <div class="title">${sec.start}–${sec.end}-savollar</div>
      <div class="meta">${sec.qs.length} ta savol</div>
      ${repeats.length>0?`<div style="margin-top:6px;"><button class="btn-repeat" onclick="event.stopPropagation();startErrorRoom(${idx})" style="font-size:.75rem;padding:6px 12px;">🔴 Xatolar ustida ishlash <span class="streak-badge">${repeats.length}</span></button></div>`:''}
    `;
    btn.onclick=()=>openTimeModal(idx);
    grid.appendChild(btn);
  });
}

// ===================== TIME MODAL =====================
function openTimeModal(sectionIdx){
  pendingSectionIdx=sectionIdx;
  document.getElementById('timeModal').classList.remove('hidden');
}
function confirmTime(seconds){
  document.getElementById('timeModal').classList.add('hidden');
  if(pendingSectionIdx!==null){
    startSection(pendingSectionIdx, seconds);
    pendingSectionIdx=null;
  }
}

// ===================== START SECTION =====================
function startSection(idx, timePerQuestion){
  isRandomMode=false;
  let sections=getSections();
  currentSection='sec_'+idx;
  currentQuestions=sections[idx].qs.map((q,i)=>({...q,origIdx:sections[idx].start-1+i}));
  // Shuffle options
  currentQuestions=currentQuestions.map(q=>shuffleOptions(q));
  currentIdx=0;
  answers=[];
  timerSeconds=timePerQuestion;
  showScreen('quiz');
  document.getElementById('quizTitle').textContent=`Bo'lim ${idx+1}: ${sections[idx].start}–${sections[idx].end}`;
  showQuestion();
}

function startRandom(){
  isRandomMode=true;
  currentSection='random_'+Date.now();
  // Pick 20 random
  let pool=[...ALL_QUESTIONS];
  let picked=[];
  let used=new Set();
  while(picked.length<20&&used.size<pool.length){
    let i=Math.floor(Math.random()*pool.length);
    if(!used.has(i)){used.add(i);picked.push({...pool[i],origIdx:i});}
  }
  currentQuestions=picked.map(q=>shuffleOptions(q));
  currentIdx=0;
  answers=[];
  timerSeconds=0; // global timer 15min
  showScreen('quiz');
  document.getElementById('quizTitle').textContent='🎲 Tasodifiy 20 ta savol';
  // Start 15min global timer
  startGlobalTimer(15*60);
  showQuestion();
}

let globalTimerInterval=null;
let globalTimerLeft=0;
function startGlobalTimer(seconds){
  clearInterval(globalTimerInterval);
  globalTimerLeft=seconds;
  updateTimerDisplay(globalTimerLeft,true);
  globalTimerInterval=setInterval(()=>{
    globalTimerLeft--;
    if(globalTimerLeft<=0){
      clearInterval(globalTimerInterval);
      // Force end
      forceEndQuiz();
    } else {
      updateTimerDisplay(globalTimerLeft,true);
    }
  },1000);
}
function updateTimerDisplay(s,global){
  let el=document.getElementById('timerDisplay');
  if(global){
    let m=Math.floor(s/60),sec=s%60;
    el.textContent=(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
    el.className='timer-display'+(s<=60?' danger':s<=180?' warn':'');
  } else {
    el.textContent=s+'s';
    el.className='timer-display'+(s<=5?' danger':s<=10?' warn':'');
  }
}

function forceEndQuiz(){
  clearInterval(timerInterval);
  clearInterval(globalTimerInterval);
  // Mark remaining as skipped (wrong)
  while(currentIdx<currentQuestions.length){
    let q=currentQuestions[currentIdx];
    answers.push({q,chosen:null,correct:q.togri,origIdx:q.origIdx});
    currentIdx++;
  }
  showResultScreen();
}

function shuffleOptions(q){
  let opts=[
    {text:q.togri,isCorrect:true},
    {text:q.xato1,isCorrect:false},
    {text:q.xato2,isCorrect:false},
    {text:q.xato3,isCorrect:false},
    {text:q.xato4||'',isCorrect:false},
  ].filter(o=>o.text&&o.text!='nan'&&o.text.trim()!='');
  // Fisher-Yates
  for(let i=opts.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  return {...q,opts};
}

// ===================== QUESTION =====================
function showQuestion(){
  clearInterval(timerInterval);
  if(currentIdx>=currentQuestions.length){
    clearInterval(globalTimerInterval);
    showResultScreen();
    return;
  }
  let q=currentQuestions[currentIdx];
  let total=currentQuestions.length;
  document.getElementById('qCounter').textContent=`Savol ${currentIdx+1} / ${total}`;
  document.getElementById('qText').textContent=q.savol;
  document.getElementById('progressFill').style.width=((currentIdx/total)*100)+'%';
  document.getElementById('feedbackEl').className='hidden';

  let optEl=document.getElementById('optionsEl');
  optEl.innerHTML='';
  let labels=['A','B','C','D','E'];
  q.opts.forEach((opt,i)=>{
    let btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="opt-label">${labels[i]}</span><span>${opt.text}</span>`;
    btn.onclick=()=>selectAnswer(opt.isCorrect, opt.text, i, q);
    optEl.appendChild(btn);
  });

  // Per-question timer (only if not global mode)
  if(!isRandomMode && timerSeconds>0){
    let left=timerSeconds;
    updateTimerDisplay(left,false);
    timerInterval=setInterval(()=>{
      left--;
      if(left<=0){
        clearInterval(timerInterval);
        // Auto-wrong
        disableOptions();
        answers.push({q,chosen:null,correct:q.togri,origIdx:q.origIdx});
        saveStats(currentSection,q.origIdx,false);
        showFeedback(false,q.togri);
        setTimeout(()=>nextQuestion(),1200);
      } else {
        updateTimerDisplay(left,false);
      }
    },1000);
  } else if(!isRandomMode) {
    document.getElementById('timerDisplay').textContent='♾️';
    document.getElementById('timerDisplay').className='timer-display';
  }
}

function selectAnswer(isCorrect, chosenText, optIdx, q){
  clearInterval(timerInterval);
  disableOptions();
  let btns=document.querySelectorAll('.option-btn');
  // Mark correct
  q.opts.forEach((opt,i)=>{
    if(opt.isCorrect) btns[i].classList.add('correct');
  });
  if(!isCorrect) btns[optIdx].classList.add('wrong');
  answers.push({q,chosen:chosenText,correct:q.togri,origIdx:q.origIdx,isCorrect});
  saveStats(currentSection,q.origIdx,isCorrect);
  showFeedback(isCorrect,q.togri);
  setTimeout(()=>nextQuestion(),isCorrect?800:1400);
}

function disableOptions(){
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
}

function showFeedback(isCorrect,correct){
  let el=document.getElementById('feedbackEl');
  el.className='feedback '+(isCorrect?'correct':'wrong');
  el.textContent=isCorrect?'✅ To\'g\'ri!':'❌ Xato! To\'g\'ri javob: '+correct;
  el.classList.remove('hidden');
}

function nextQuestion(){
  currentIdx++;
  showQuestion();
}

// ===================== RESULT =====================
function showResultScreen(){
  let correct=answers.filter(a=>a.isCorrect).length;
  let total=answers.length;
  let pct=total?Math.round(correct/total*100):0;

  document.getElementById('scorePct').textContent=pct+'%';
  let circle=document.getElementById('scoreCircle');
  circle.className='score-circle '+(pct>=70?'good':pct>=40?'mid':'bad');
  document.getElementById('resultTitle').textContent=pct>=85?'🏆 Ajoyib natija!':pct>=60?'👍 Yaxshi!':pct>=40?'😐 Qoniqarli':'😟 Tayyorgarlik kerak';
  document.getElementById('statCorrect').textContent=correct;
  document.getElementById('statWrong').textContent=total-correct;
  document.getElementById('statTotal').textContent=total;

  // Record session errors
  if(!isRandomMode){
    let errorIdxs=answers.filter(a=>!a.isCorrect).map(a=>a.origIdx);
    recordSession(currentSection,errorIdxs);
  }

  let btns=document.getElementById('resultBtns');
  btns.innerHTML='';
  // Home btn
  let hBtn=document.createElement('button');
  hBtn.className='btn-secondary';hBtn.textContent='🏠 Bosh sahifa';
  hBtn.onclick=goHome;btns.appendChild(hBtn);
  // Analysis
  let aBtn=document.createElement('button');
  aBtn.className='btn-primary';aBtn.textContent='📊 Tahlil';
  aBtn.onclick=showAnalysis;btns.appendChild(aBtn);
  // Repeat errors (if any)
  if(!isRandomMode){
    let repeatErrors=getRepeatErrors(currentSection);
    if(repeatErrors.length>0){
      let rBtn=document.createElement('button');
      rBtn.className='btn-repeat';
      rBtn.innerHTML='🔴 Xatolar ustida ishlash <span class="streak-badge">'+repeatErrors.length+'</span>';
      let secIdx=parseInt(currentSection.replace('sec_',''));
      rBtn.onclick=()=>startErrorRoom(secIdx);
      btns.appendChild(rBtn);
    }
  }

  showScreen('result');
}

function showResult(){showScreen('result');}

// ===================== ANALYSIS =====================
function showAnalysis(){
  let content=document.getElementById('analysisContent');
  content.innerHTML='';
  answers.forEach((a,i)=>{
    let div=document.createElement('div');
    div.className='analysis-item';
    let statusIcon=a.isCorrect?'✅':'❌';
    div.innerHTML=`<div class="analysis-q"><span class="q-num">SAVOL ${i+1} ${statusIcon}</span><br>${a.q.savol}</div>`;
    let answersDiv=document.createElement('div');
    answersDiv.className='analysis-answers';
    // Show correct
    let cRow=document.createElement('div');
    cRow.className='a-row correct';
    cRow.innerHTML=`<span class="tag">TO'G'RI</span><span>${a.correct}</span>`;
    answersDiv.appendChild(cRow);
    // Show user's wrong answer
    if(!a.isCorrect&&a.chosen){
      let wRow=document.createElement('div');
      wRow.className='a-row user-wrong';
      wRow.innerHTML=`<span class="tag">SENING JAVOB</span><span>${a.chosen}</span>`;
      answersDiv.appendChild(wRow);
    } else if(!a.isCorrect&&!a.chosen){
      let wRow=document.createElement('div');
      wRow.className='a-row user-wrong';
      wRow.innerHTML=`<span class="tag">VAQT TUGADI</span><span>Javob berilmadi</span>`;
      answersDiv.appendChild(wRow);
    }
    div.appendChild(answersDiv);
    content.appendChild(div);
  });
  showScreen('analysis');
}

// ===================== ERROR ROOM =====================
function startErrorRoom(sectionIdx){
  let sections=getSections();
  let key='sec_'+sectionIdx;
  let errorIdxs=getRepeatErrors(key);
  if(errorIdxs.length===0){alert('Hozircha takrorlanuvchi xatolar yo\'q.');return;}
  // Get questions by origIdx
  let errQs=errorIdxs.map(i=>({...ALL_QUESTIONS[i],origIdx:i}));
  errQs=errQs.map(q=>shuffleOptions(q));

  document.getElementById('erBadge').textContent=errQs.length+' ta savol';
  document.getElementById('error-room').classList.remove('hidden');
  document.getElementById('home').classList.add('hidden');

  // Build mini quiz inside error room
  let body=document.getElementById('errorRoomBody');
  body.innerHTML='';
  let container=document.createElement('div');
  container.style.cssText='max-width:700px;margin:0 auto;padding:20px 16px;';
  body.appendChild(container);

  let erIdx=0;
  let erAnswers=[];

  function renderERQuestion(){
    if(erIdx>=errQs.length){
      // Done
      let correct=erAnswers.filter(a=>a.isCorrect).length;
      container.innerHTML=`<div class="result-card" style="text-align:center;margin-top:24px;">
        <div style="font-size:2rem;margin-bottom:12px;">🎓</div>
        <h2>Mashg'ulot tugadi!</h2>
        <div class="stats-row" style="margin-top:16px;">
          <div class="stat"><div class="val" style="color:var(--green)">${correct}</div><div class="lbl">To'g'ri</div></div>
          <div class="stat"><div class="val" style="color:var(--red)">${erAnswers.length-correct}</div><div class="lbl">Xato</div></div>
        </div>
        <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button class="btn-secondary" onclick="goHome()">🏠 Bosh sahifa</button>
          <button class="btn-primary" onclick="startErrorRoom(${sectionIdx})">🔄 Qaytadan</button>
        </div>
      </div>`;
      return;
    }
    let q=errQs[erIdx];
    container.innerHTML='';
    let qCountEl=document.createElement('div');
    qCountEl.className='q-counter';
    qCountEl.textContent=`Savol ${erIdx+1} / ${errQs.length}`;
    let progressBar=document.createElement('div');
    progressBar.innerHTML=`<div style="height:3px;background:var(--border);border-radius:3px;margin-bottom:16px;"><div style="height:100%;background:var(--red);border-radius:3px;width:${(erIdx/errQs.length)*100}%;transition:width .3s;"></div></div>`;
    let qTextEl=document.createElement('div');
    qTextEl.className='q-text';
    qTextEl.textContent=q.savol;
    let optsEl=document.createElement('div');
    optsEl.className='options';
    let labels=['A','B','C','D','E'];
    let answered=false;
    q.opts.forEach((opt,i)=>{
      let btn=document.createElement('button');
      btn.className='option-btn';
      btn.innerHTML=`<span class="opt-label">${labels[i]}</span><span>${opt.text}</span>`;
      btn.onclick=()=>{
        if(answered)return;
        answered=true;
        let btns=optsEl.querySelectorAll('.option-btn');
        q.opts.forEach((o,j)=>{if(o.isCorrect)btns[j].classList.add('correct');});
        if(!opt.isCorrect)btn.classList.add('wrong');
        btns.forEach(b=>b.disabled=true);
        erAnswers.push({isCorrect:opt.isCorrect});
        let fbEl=document.createElement('div');
        fbEl.className='feedback '+(opt.isCorrect?'correct':'wrong');
        fbEl.textContent=opt.isCorrect?'✅ To\'g\'ri!':'❌ Xato! To\'g\'ri: '+q.togri;
        container.appendChild(fbEl);
        setTimeout(()=>{erIdx++;renderERQuestion();},opt.isCorrect?800:1600);
      };
      optsEl.appendChild(btn);
    });
    container.appendChild(qCountEl);
    container.appendChild(progressBar);
    container.appendChild(qTextEl);
    container.appendChild(optsEl);
  }
  renderERQuestion();
}

// ===================== NAVIGATION =====================
function showScreen(name){
  ['home','quiz','result','analysis','error-room'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById(name).classList.remove('hidden');
}
function goHome(){
  clearInterval(timerInterval);
  clearInterval(globalTimerInterval);
  buildHome();
  showScreen('home');
}

// ===================== EKG + @DeFs_Team BACKGROUND ANIMATION =====================
(function(){
  const canvas = document.getElementById('ekg-canvas');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // EKG waveform pattern (P wave, QRS, T wave)
  const ekgPattern = [
    [0,    0.5],
    [0.04, 0.5],
    [0.06, 0.46],
    [0.08, 0.42],
    [0.10, 0.46],
    [0.12, 0.5],
    [0.16, 0.5],
    [0.17, 0.55],
    [0.18, 0.15],  // R peak
    [0.19, 0.72],  // S
    [0.21, 0.5],
    [0.26, 0.5],
    [0.30, 0.44],
    [0.34, 0.40],  // T peak
    [0.38, 0.44],
    [0.42, 0.5],
    [1.0,  0.5],
  ];

  function getEKGY(normX){
    for(let i = 0; i < ekgPattern.length - 1; i++){
      const [x0, y0] = ekgPattern[i];
      const [x1, y1] = ekgPattern[i+1];
      if(normX >= x0 && normX <= x1){
        const t = (normX - x0) / (x1 - x0);
        return y0 + (y1 - y0) * t;
      }
    }
    return 0.5;
  }

  // 3 EKG lines — upper half of screen
  const NUM_EKG = 3;
  const ekgLines = [];
  for(let i = 0; i < NUM_EKG; i++){
    ekgLines.push({
      speed: 160 + i * 55,
      headX: -(300 + i * 400),
      tail: 850,
      alpha: 0.85 - i * 0.18,
      lineW: 2.4 - i * 0.4,
    });
  }

  // 3 scrolling @DeFs_Team text rows — lower half of screen
  const NUM_TEXT = 3;
  const textRows = [];
  const FONT_SIZES = [28, 20, 15];
  const TEXT_SPEEDS = [55, 38, 28];
  const TEXT_ALPHAS = [0.55, 0.35, 0.22];
  const TEXT_GAPS   = [380, 300, 260]; // gap between repeated texts

  for(let i = 0; i < NUM_TEXT; i++){
    textRows.push({
      x: i === 0 ? 0 : (i === 1 ? -200 : -100),
      speed: TEXT_SPEEDS[i],
      fontSize: FONT_SIZES[i],
      alpha: TEXT_ALPHAS[i],
      gap: TEXT_GAPS[i],
    });
  }

  let lastTime = null;

  function drawEKGLine(line, cycleWidth, rowY){
    const { headX, tail, alpha, lineW } = line;

    ctx.save();
    ctx.strokeStyle = `rgba(56, 189, 248, ${alpha})`;
    ctx.lineWidth = lineW;
    ctx.shadowColor = 'rgba(56, 189, 248, 1)';
    ctx.shadowBlur = 12;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    const startX = headX - tail;
    const STEP = 3;

    ctx.beginPath();
    let first = true;
    for(let px = startX; px <= headX; px += STEP){
      const cyclePos = ((px % cycleWidth) + cycleWidth) % cycleWidth;
      const normX = cyclePos / cycleWidth;
      const normY = getEKGY(normX);
      const amp = H * 0.07;
      const drawY = rowY + (normY - 0.5) * amp * 2;
      if(first){ ctx.moveTo(px, drawY); first = false; }
      else ctx.lineTo(px, drawY);
    }
    ctx.stroke();

    // Glowing head dot
    const hCyclePos = ((headX % cycleWidth) + cycleWidth) % cycleWidth;
    const hNormY = getEKGY(hCyclePos / cycleWidth);
    const hAmp = H * 0.07;
    const hY = rowY + (hNormY - 0.5) * hAmp * 2;
    ctx.beginPath();
    ctx.arc(headX, hY, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(56, 189, 248, ${Math.min(1, alpha * 2.2)})`;
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.restore();
  }

  function drawTextRow(row, rowY){
    ctx.save();
    ctx.font = `800 ${row.fontSize}px 'Fira Mono', monospace`;
    ctx.fillStyle = `rgba(56, 189, 248, ${row.alpha})`;
    ctx.shadowColor = 'rgba(56, 189, 248, 0.9)';
    ctx.shadowBlur = row.fontSize > 22 ? 20 : 10;
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '2px';

    const text = '@DeFs_Team';
    const textW = ctx.measureText(text).width;
    const totalUnit = textW + row.gap;

    // Draw enough copies to fill screen
    let startX = (row.x % totalUnit);
    if(startX > 0) startX -= totalUnit;

    for(let x = startX; x < W + textW; x += totalUnit){
      ctx.fillText(text, x, rowY);
    }
    ctx.restore();
  }

  function animate(timestamp){
    if(!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    ctx.clearRect(0, 0, W, H);

    const cycleWidth = W * 0.52;

    // EKG lines — spread in top 58% of screen
    for(let i = 0; i < NUM_EKG; i++){
      const rowY = H * (0.15 + i * 0.18);
      ekgLines[i].headX += ekgLines[i].speed * dt;
      if(ekgLines[i].headX > W + cycleWidth) ekgLines[i].headX = -ekgLines[i].tail;
      drawEKGLine(ekgLines[i], cycleWidth, rowY);
    }

    // @DeFs_Team text rows — spread in bottom 35% of screen
    for(let i = 0; i < NUM_TEXT; i++){
      const rowY = H * (0.70 + i * 0.12);
      textRows[i].x += textRows[i].speed * dt;
      drawTextRow(textRows[i], rowY);
    }

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
})();

// ===================== INIT =====================
buildHome();
showScreen('home');
</script>
